<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IGNIS Robotics – Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/Team logo.png" type="image/png">
</head>
<body>
  <header class="site-header">
    <div class="logo-lockup">
      <img class="site-logo" src="images/Team logo.png" alt="IGNIS Robotics logo">
      <h1>IGNIS Robotics</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="sponsors.html">Sponsors</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-image">
        <img src="images/frc-robot-sample.svg" alt="FRC robot illustration placeholder" />
      </div>
      <div class="contact-info">
        <h2>Contact Us</h2>
        <p>For general questions, sponsorship inquiries, or donations, please email our team at the address below.</p>
        <p class="contact-email">ignisrobotics@gmail.com</p>
        <p class="form-note">We’re a student-run team; we check messages regularly and will reply as soon as possible.</p>
        <div class="social-buttons">
          <a class="social-btn youtube" href="#" aria-label="IGNIS Robotics YouTube">
            YouTube
          </a>
          <a class="social-btn instagram" href="#" aria-label="IGNIS Robotics Instagram">
            Instagram
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- footer removed per request -->

  <script src="js/main.js"></script>
</body>
</html>
