<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IGNIS Robotics – Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../images/Team logo.png" type="image/png">
</head>
<body>
  <header class="site-header">
    <div class="logo-lockup">
      <img class="site-logo" src="../images/Team logo.png" alt="IGNIS Robotics logo">
      <h1>IGNIS Robotics</h1>
    </div>
    <nav>
      <a href="../home/">Home</a>
      <a href="../about/">About</a>
      <a href="../sponsors/">Sponsors</a>
      <a href="../contact/">Contact</a>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-image">
        <img src="../images/frc-robot-sample.svg" alt="FRC robot illustration placeholder" />
      </div>
      <div class="contact-info">
        <h2>Contact Us</h2>
        <p>For general questions, sponsorship inquiries, or donations, please email our team at the address below.</p>
        <p class="contact-email">ignisrobotics@gmail.com</p>
        <p class="form-note">We’re a student-run team; we check messages regularly and will reply as soon as possible.</p>
        <div class="social-buttons">
          <a class="social-btn youtube" href="https://www.youtube.com/channel/UCkX5yUeLi_zcfDNouJ_GSyA" target="_blank" rel="noopener" aria-label="IGNIS Robotics YouTube">
            YouTube
          </a>
          <a class="social-btn instagram" href="https://www.instagram.com/ignis_robotics/" target="_blank" rel="noopener" aria-label="IGNIS Robotics Instagram">
            Instagram
          </a>
        </div>
      </div>
    </section>
  </main>

  <!-- footer removed per request -->

  <script src="../js/main.js"></script>
</body>
</html>
